<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeDesk Pro - Add Trade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07070f; color: #eeeef8; font-family: Arial, sans-serif; min-height: 100vh; }
    .sidebar { width: 70px; background: #0e0e1c; position: fixed; height: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 20px; }
    .logo { background: #00e87a; color: black; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; margin-bottom: 20px; }
    .s-nav { color: #888; font-size: 28px; text-decoration: none; padding: 12px; width: 100%; text-align: center; }
    .s-nav:hover, .s-nav.active { color: #00e87a; background: #181830; }
    .main { margin-left: 80px; padding: 30px; }
    h1 { color: #00e87a; font-size: 28px; }
    .card { background: #131325; padding: 25px; border-radius: 14px; margin-top: 20px; border: 1px solid #222; }
    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; }
    input, select { width: 100%; padding: 12px; background: #181830; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 15px; }
    .add-btn { background: #00e87a; color: black; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
  </style>
</head>
<body>

  <!-- Sidebar - Multi Page ke liye -->
<nav class="sidebar">
  <div class="s-logo">TD</div>
  
  <a href="index.html" class="s-nav">📊</a>
  <a href="options.html" class="s-nav">📈</a>
  <a href="equity.html" class="s-nav">📉</a>
  <a href="commodity.html" class="s-nav">🛢</a>
  <a href="trades.html" class="s-nav">📋</a>
  <a href="add.html" class="s-nav active">➕</a>
</nav>

  <div class="main">
    <h1>ADD NEW TRADE</h1>

    <div class="card">
      <label>Segment</label>
      <select id="segment">
        <option>Options</option>
        <option>Equity</option>
        <option>Commodity</option>
      </select>

      <label>Symbol</label>
      <input type="text" id="symbol" value="BANKNIFTY 45200 CE">

      <label>Type</label>
      <select id="type">
        <option>BUY</option>
        <option>SELL</option>
      </select>

      <label>Quantity</label>
      <input type="number" id="qty" value="25">

      <label>Entry Price</label>
      <input type="number" step="0.05" id="entry" value="285.50">

      <label>Exit Price</label>
      <input type="number" step="0.05" id="exit" value="342.75">

      <button class="add-btn" onclick="addTrade()">ADD TRADE</button>
    </div>
  </div>

  <script>
    function addTrade() {
      const trade = {
        id: Date.now(),
        date: new Date().toISOString().split('T')[0],
        segment: document.getElementById('segment').value,
        symbol: document.getElementById('symbol').value,
        type: document.getElementById('type').value,
        qty: parseFloat(document.getElementById('qty').value),
        entry: parseFloat(document.getElementById('entry').value),
        exit: parseFloat(document.getElementById('exit').value)
      };

      // Calculate P&L
      trade.pnl = trade.type === "BUY" 
        ? (trade.exit - trade.entry) * trade.qty 
        : (trade.entry - trade.exit) * trade.qty;

      // Save to LocalStorage
      let trades = JSON.parse(localStorage.getItem('trades') || '[]');
      trades.unshift(trade);  // Naya trade top pe
      localStorage.setItem('trades', JSON.stringify(trades));

      alert(`✅ Trade Added Successfully!\nSymbol: \( {trade.symbol}\nP&L: ₹ \){trade.pnl.toFixed(2)}`);
      
      // Optional: Add hone ke baad form clear kar sakte ho
      // document.getElementById('symbol').value = "";
    }
  </script>
</body>
</html>
