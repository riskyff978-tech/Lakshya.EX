<option value="ALL">All Types</option>
          <option value="BUY">Buy</option>
          <option value="SELL">Sell</option>
        </select>
      </div>
      <div class="tbl-wrap" id="tbl-all"></div>
    </div>

    <!-- ADD TRADE -->
    <div id="sec-add" class="sec">
      <div class="seg-h">
        <div class="seg-ico" style="background:var(--g3)"><span style="color:var(--g)">+</span></div>
        <div><div class="seg-name" style="color:var(--g)">ADD NEW TRADE</div></div>
      </div>
      <div class="card">
        <div class="card-b">
          <div class="form-ttl">Trade Details</div>
          <div class="form-grid">
            <div>
              <label class="f-lbl">Segment</label>
              <select class="f-sel" id="add-seg">
                <option value="Options">Options</option>
                <option value="Equity">Equity</option>
                <option value="Commodity">Commodity</option>
              </select>
            </div>
            <div>
              <label class="f-lbl">Symbol</label>
              <input type="text" class="f-inp" id="add-sym" placeholder="BANKNIFTY 45000 CE" value="BANKNIFTY 45000 CE">
            </div>
            <div>
              <label class="f-lbl">Type</label>
              <select class="f-sel" id="add-type">
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
              </select>
            </div>
            <div>
              <label class="f-lbl">Quantity</label>
              <input type="number" class="f-inp" id="add-qty" value="25">
            </div>
            <div>
              <label class="f-lbl">Entry Price</label>
              <input type="number" step="0.05" class="f-inp" id="add-entry" value="312.50">
            </div>
            <div>
              <label class="f-lbl">Exit Price</label>
              <input type="number" step="0.05" class="f-inp" id="add-exit" value="387.75">
            </div>
            <div>
              <label class="f-lbl">Date</label>
              <input type="date" class="f-inp" id="add-date" value="2025-04-02">
            </div>
          </div>
          <button class="add-btn" onclick="addNewTrade()">
            <span>ADD TRADE TO PORTFOLIO</span>
          </button>
        </div>
      </div>
    </div>

  </div> <!-- content end -->
</div> <!-- main end -->
</div> <!-- wrap end -->

<script>
// ==================== SAMPLE DATA ====================
let trades = [
  {id:1, seg:"Options", sym:"BANKNIFTY 45000 CE", type:"BUY", qty:25, entry:312.50, exit:387.75, date:"2025-04-02", pnl:1881.25},
  {id:2, seg:"Equity", sym:"RELIANCE", type:"SELL", qty:10, entry:1245.00, exit:1198.50, date:"2025-04-01", pnl:-465},
  {id:3, seg:"Commodity", sym:"GOLD", type:"BUY", qty:1, entry:78200, exit:79150, date:"2025-03-31", pnl:950},
  {id:4, seg:"Options", sym:"NIFTY 24500 PE", type:"SELL", qty:50, entry:87.25, exit:42.50, date:"2025-04-03", pnl:2237.5}
];

// ==================== CHARTS ====================
let mainChart, donutChart;

function initCharts() {
  // Main Cumulative Chart
  const ctx1 = document.getElementById('chart-main');
  if (ctx1) {
    mainChart = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['Mar 28','Mar 29','Mar 30','Mar 31','Apr 1','Apr 2','Apr 3'],
        datasets: [{
          label: 'P&L',
          data: [-1200, 450, 2100, 1850, 3200, 2780, 4100],
          borderColor: '#00e87a',
          tension: 0.4,
          borderWidth: 3,
          pointRadius: 0
        }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
    });
  }

  // Donut Chart
  const ctx2 = document.getElementById('chart-donut');
  if (ctx2) {
    donutChart = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: ['Options','Equity','Commodity'],
        datasets: [{
          data: [58, 27, 15],
          backgroundColor: ['#c084fc', '#4f9eff', '#ffc046'],
          borderColor: 'var(--s2)',
          borderWidth: 4
        }]
      },
      options: {
        responsive:true,
        cutout: '78%',
        plugins: { legend:{display:false} }
      }
    });
  }
}

// ==================== RENDER FUNCTIONS ====================
function renderOverview() {
  // Stats (dummy)
  document.getElementById('ov-stats').innerHTML = `
    <div class="sc sc-g"><div class="sc-ico">₹</div><div class="sc-lbl">TOTAL P&amp;L</div><div class="sc-val">+₹8,603</div><div class="sc-sub">+4.2% today</div></div>
    <div class="sc sc-b"><div class="sc-ico">📈</div><div class="sc-lbl">WIN RATE</div><div class="sc-val">68%</div><div class="sc-sub">17/25 trades</div></div>
    <div class="sc sc-a"><div class="sc-ico">⚡</div><div class="sc-lbl">AVG. TRADE</div><div class="sc-val">₹512</div></div>
    <div class="sc sc-r"><div class="sc-ico">⏱</div><div class="sc-lbl">MAX DD</div><div class="sc-val">-2.1%</div></div>
    <div class="sc sc-v"><div class="sc-ico">🔄</div><div class="sc-lbl">TRADES</div><div class="sc-val">25</div></div>
  `;

  // Recent Trades Table
  let html = `<table><thead><tr><th>DATE</th><th>SEGMENT</th><th>SYMBOL</th><th>TYPE</th><th>P&amp;L</th></tr></thead><tbody>`;
  trades.slice(0,4).forEach(t => {
    html += `<tr>
      <td>${t.date}</td>
      <td><span class="tag tag-o">${t.seg}</span></td>
      <td>${t.sym}</td>
      <td><span class="\( {t.type==='BUY'?'c-buy':'c-sell'}"> \){t.type}</span></td>
      <td class="\( {t.pnl>0?'c-pos':'c-neg'}">₹ \){t.pnl}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('tbl-recent').innerHTML = html;
}

// Tab Switching
document.querySelectorAll('.s-nav').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.s-nav').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');

    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    const tab = btn.getAttribute('data-tab');
    document.getElementById(`sec-${tab}`).classList.add('on');

    document.getElementById('pg-title').textContent = tab.toUpperCase();
  });
});

// Add New Trade
function addNewTrade() {
  const newTrade = {
    id: Date.now(),
    seg: document.getElementById('add-seg').value,
    sym: document.getElementById('add-sym').value,
    type: document.getElementById('add-type').value,
    qty: parseFloat(document.getElementById('add-qty').value),
    entry: parseFloat(document.getElementById('add-entry').value),
    exit: parseFloat(document.getElementById('add-exit').value),
    date: document.getElementById('add-date').value,
    pnl: Math.round(Math.random()*3000 - 500)
  };
  trades.unshift(newTrade);
  renderOverview();
  showToast("Trade Added Successfully ✓");
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2500);
}

// Date in Topbar
function setDate() {
  const d = new Date();
  const options = { weekday:'short', month:'short', day:'numeric' };
  document.getElementById('t-date').textContent = d.toLocaleDateString('en-IN', options);
}

// Initialize everything
window.onload = () => {
  initCharts();
  renderOverview();
  setDate();
};
</script>
</body>
</html>
