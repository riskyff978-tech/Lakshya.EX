<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeDesk Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* Same CSS as before (main part) - space save karne ke liye yahan short kiya, pura CSS pehle wale code se copy kar sakte ho */
* {box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--s1:#0e0e1c;--s2:#131325;--s3:#181830;
  --g:#00e87a;--r:#ff3d5a;--bl:#4f9eff;--am:#ffc046;--vi:#c084fc;
  --tx:#eeeef8;--tx2:#8888a8;--tx3:#44445a;
  --rad:14px;
}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
.wrap{display:flex;min-height:100vh}
.sidebar{width:68px;background:var(--s1);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:8px}
.main{margin-left:68px;flex:1}
.topbar{height:58px;background:rgba(7,7,15,0.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid rgba(255,255,255,0.05)}
.content{padding:20px;flex:1}

.s-logo{width:40px;height:40px;background:var(--g);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#000;font-weight:bold}
.s-nav{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:20px;cursor:pointer;transition:0.2s}
.s-nav:hover{background:var(--s3);color:var(--tx2)}
.s-nav.on{background:rgba(0,232,122,0.15);color:var(--g)}

.t-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.t-live{padding:6px 14px;background:rgba(0,232,122,0.15);border:1px solid rgba(0,232,122,0.3);border-radius:30px;font-size:10px;color:var(--g);display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace}
.t-dot{width:7px;height:7px;background:var(--g);border-radius:50%;animation:blink 1.8s infinite}
@keyframes blink{50%{opacity:0.3}}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.sc{background:var(--s2);border:1px solid rgba(255,255,255,0.05);border-radius:var(--rad);padding:18px}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;margin:8px 0 4px}
.sc-lbl{font-size:9.5px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase}

.card{background:var(--s2);border:1px solid rgba(255,255,255,0.05);border-radius:var(--rad);margin-bottom:20px;overflow:hidden}
.card-h{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:1px;color:var(--tx2);text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.chart-container{height:240px;padding:20px}

/* Form */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin:20px 0}
.f-inp,.f-sel{width:100%;background:var(--s3);border:1px solid rgba(255,255,255,0.08);padding:12px;border-radius:8px;color:var(--tx);font-family:'JetBrains Mono',monospace}
.add-btn{background:var(--g);color:#000;padding:14px 28px;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:10px}
</style>
</head>
<body>

<div class="wrap">
  <!-- Sidebar -->
  <!-- Sidebar - Multi Page ke liye -->
<nav class="sidebar">
  <div class="s-logo">TD</div>
  
  <a href="index.html" class="s-nav active">📊</a>
  <a href="options.html" class="s-nav">📈</a>
  <a href="equity.html" class="s-nav">📉</a>
  <a href="commodity.html" class="s-nav">🛢</a>
  <a href="trades.html" class="s-nav">📋</a>
  <a href="add.html" class="s-nav">➕</a>
</nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="t-title" id="pg-title">OVERVIEW</div>
      </div>
      <div class="t-live"><div class="t-dot"></div>LIVE • 03 Apr 2026</div>
    </div>

    <div class="content">

      <!-- OVERVIEW -->
      <div id="sec-overview" class="sec on">
        <div class="stats">
          <div class="sc"><div class="sc-lbl">TOTAL P&amp;L</div><div class="sc-val" style="color:var(--g)">+₹8,705</div></div>
          <div class="sc"><div class="sc-lbl">WIN RATE</div><div class="sc-val" style="color:var(--bl)">66.7%</div></div>
          <div class="sc"><div class="sc-lbl">AVG WINNER</div><div class="sc-val" style="color:var(--g)">₹1,560</div></div>
          <div class="sc"><div class="sc-lbl">AVG LOSER</div><div class="sc-val" style="color:var(--r)">-₹943.75</div></div>
        </div>

        <div class="card">
          <div class="card-h">CUMULATIVE P&amp;L</div>
          <div class="chart-container"><canvas id="chart-main"></canvas></div>
        </div>
      </div>

      <!-- OPTIONS -->
      <div id="sec-options" class="sec">
        <div class="stats">
          <div class="sc"><div class="sc-lbl">OPTIONS P&amp;L</div><div class="sc-val" style="color:var(--vi)">+₹4,820</div></div>
          <div class="sc"><div class="sc-lbl">CALLS</div><div class="sc-val">12</div></div>
          <div class="sc"><div class="sc-lbl">PUTS</div><div class="sc-val">8</div></div>
        </div>
        <div class="card">
          <div class="card-h">OPTIONS P&amp;L CURVE</div>
          <div class="chart-container"><canvas id="chart-op"></canvas></div>
        </div>
      </div>

      <!-- EQUITY, COMMODITY, TRADES (similar structure) -->
      <div id="sec-equity" class="sec"><div style="padding:60px 20px;text-align:center;color:var(--tx2)">Equity Dashboard Coming Soon...</div></div>
      <div id="sec-commodity" class="sec"><div style="padding:60px 20px;text-align:center;color:var(--tx2)">Commodity Dashboard Coming Soon...</div></div>
      <div id="sec-trades" class="sec"><div style="padding:60px 20px;text-align:center;color:var(--tx2)">All Trades Table Coming Soon...</div></div>

      <!-- ADD TRADE -->
      <div id="sec-add" class="sec">
        <div class="card">
          <div class="card-h">ADD NEW TRADE</div>
          <div style="padding:24px">
            <div class="form-grid">
              <div>
                <label style="display:block;margin-bottom:6px;font-size:10px;color:var(--tx3)">SEGMENT</label>
                <select class="f-sel" id="add-seg"><option>Options</option><option>Equity</option><option>Commodity</option></select>
              </div>
              <div>
                <label style="display:block;margin-bottom:6px;font-size:10px;color:var(--tx3)">SYMBOL</label>
                <input type="text" class="f-inp" id="add-sym" value="BANKNIFTY 45200 CE">
              </div>
              <div>
                <label style="display:block;margin-bottom:6px;font-size:10px;color:var(--tx3)">TYPE</label>
                <select class="f-sel" id="add-type"><option>BUY</option><option>SELL</option></select>
              </div>
              <div>
                <label style="display:block;margin-bottom:6px;font-size:10px;color:var(--tx3)">QTY</label>
                <input type="number" class="f-inp" id="add-qty" value="25">
              </div>
              <div>
                <label style="display:block;margin-bottom:6px;font-size:10px;color:var(--tx3)">ENTRY</label>
                <input type="number" class="f-inp" id="add-entry" value="285.50" step="0.05">
              </div>
              <div>
                <label style="display:block;margin-bottom:6px;font-size:10px;color:var(--tx3)">EXIT</label>
                <input type="number" class="f-inp" id="add-exit" value="342.75" step="0.05">
              </div>
            </div>
            <button class="add-btn" onclick="addTrade()">ADD TO PORTFOLIO</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// Tab Switching
document.querySelectorAll('.s-nav').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.s-nav').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');

    document.querySelectorAll('.sec').forEach(sec => sec.classList.remove('on'));
    document.getElementById('sec-' + btn.dataset.tab).classList.add('on');
    document.getElementById('pg-title').textContent = btn.dataset.tab.toUpperCase();
  });
});

// Charts
let mainChart, opChart;
function initCharts() {
  // Main Chart
  mainChart = new Chart(document.getElementById('chart-main'), {
    type: 'line',
    data: { labels: ['28','29','30','31','1','2','3'], datasets: [{data: [1200,1800,3200,4100,6500,7200,8705], borderColor: '#00e87a', tension: 0.4, fill: true, backgroundColor: 'rgba(0,232,122,0.1)'}] },
    options: { responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}} }
  });

  // Options Chart
  opChart = new Chart(document.getElementById('chart-op'), {
    type: 'bar',
    data: { labels: ['Calls','Puts'], datasets: [{data: [6200, -1380], backgroundColor: ['#c084fc','#ff3d5a']}] },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

// Add Trade Function
function addTrade() {
  const sym = document.getElementById('add-sym').value;
  alert(`✅ Trade Added Successfully!\nSymbol: ${sym}\n\n(You can expand this to update tables later)`);
  // Future: trades array push + re-render
}

// Init
window.onload = () => {
  initCharts();
};
</script>
</body>
</html>
