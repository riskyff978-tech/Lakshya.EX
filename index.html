<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Dashboard</title>\n    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>\n    <style>\n        /* Add your custom styles here */\n    </style>\n</head>\n<body>\n    <h1>Dashboard</h1>\n    <form id="dataForm">\n        <input type="text" id="dataInput" placeholder="Enter data" required />\n        <button type="submit">Submit</button>\n    </form>\n    <canvas id="myChart"></canvas>\n    <script>\n        let form = document.getElementById('dataForm');\n        let dataInput = document.getElementById('dataInput');\n        let chartData = [];\n        let myChart;\n\n        form.addEventListener('submit', (event) => {\n            event.preventDefault();\n            let value = dataInput.value;\n            chartData.push(value);\n            localStorage.setItem('chartData', JSON.stringify(chartData));\n            updateChart();\n            dataInput.value = '';\n        });\n\n        function updateChart() {\n            const ctx = document.getElementById('myChart').getContext('2d');\n            const chartConfig = {\n                type: 'line',\n                data: {\n                    labels: chartData,\n                    datasets: [{\n                        label: 'My Dataset',\n                        data: chartData,\n                        borderColor: 'rgba(75, 192, 192, 1)',\n                        borderWidth: 1,\n                        fill: false\n                    }]\n                },\n                options: {\n                    responsive: true,\n                    scales: {\n                        y: {\n                            beginAtZero: true\n                        }\n                    }\n                }\n            };\n            if (myChart) {\n                myChart.destroy();\n            }\n            myChart = new Chart(ctx, chartConfig);\n        }\n\n        window.onload = () => {\n            if (localStorage.getItem('chartData')) {\n                chartData = JSON.parse(localStorage.getItem('chartData'));\n                updateChart();\n            }\n        };\n    <\/script>\n</body>\n</html>\n
