<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeDesk Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--bg:#080810;
--bg1:#0d0d1a;
--bg2:#111120;
--green:#0fea8e;
--red:#ff4565;
--text:#f0f0f8;
--text2:#9898b0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans'}

.sidebar{
width:70px;height:100vh;position:fixed;background:var(--bg1);
display:flex;flex-direction:column;align-items:center;padding-top:20px
}
.nav{
padding:14px;color:var(--text2);cursor:pointer
}
.nav.active,.nav:hover{color:var(--green)}

.main{margin-left:70px;padding:20px}

.card{
background:var(--bg2);
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.stat{
background:#161628;
padding:10px;
border-radius:8px;
}

.green{color:var(--green)}
.red{color:var(--red)}

table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #222}

input,select{
width:100%;
padding:10px;
background:#161628;
border:1px solid #333;
color:#fff;
margin-bottom:8px;
}

button{
background:var(--green);
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="nav active" onclick="sw('overview',this)">OV</div>
<div class="nav" onclick="sw('trades',this)">TR</div>
<div class="nav" onclick="sw('add',this)">+</div>
</div>

<div class="main">

<!-- OVERVIEW -->
<div id="overview" class="card">
<h2>Overview</h2>
<div class="grid" id="stats"></div>
<canvas id="chart"></canvas>
</div>

<!-- TRADES -->
<div id="trades" class="card" style="display:none">
<h3>All Trades</h3>
<select id="filter" onchange="renderAll()">
<option value="ALL">All</option>
<option value="WIN">Winning</option>
<option value="LOSS">Loss</option>
</select>
<div id="table"></div>
</div>

<!-- ADD -->
<div id="add" class="card" style="display:none">
<h3>Add Trade</h3>

<input type="date" id="d">
<input id="sym" placeholder="Symbol">
<select id="dir">
<option>BUY</option>
<option>SELL</option>
</select>
<input type="number" id="qty" placeholder="Qty">
<input type="number" id="en" placeholder="Entry">
<input type="number" id="ex" placeholder="Exit">

<button onclick="addTrade()">Add Trade</button>

</div>

</div>

<!-- CHART -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script>

/* ===== STORAGE SAFE ===== */
let T;
try{
T=JSON.parse(localStorage.getItem("td_pro"))
}catch(e){T=null}

if(!T){
T=[
{id:1,date:'2026-03-01',symbol:'NIFTY',type:'BUY',qty:50,entry:100,exit:150,pnl:2500},
{id:2,date:'2026-03-02',symbol:'BANKNIFTY',type:'BUY',qty:25,entry:80,exit:60,pnl:-500}
];
save();
}

function save(){
localStorage.setItem("td_pro",JSON.stringify(T))
}

/* ===== NAV ===== */
function sw(tab,el){
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"))
el.classList.add("active")

document.getElementById("overview").style.display="none"
document.getElementById("trades").style.display="none"
document.getElementById("add").style.display="none"

document.getElementById(tab).style.display="block"
}

/* ===== STATS ===== */
function stats(){
let tot=T.reduce((a,b)=>a+b.pnl,0)
let win=T.filter(t=>t.pnl>0)
let loss=T.filter(t=>t.pnl<0)

document.getElementById("stats").innerHTML=`
<div class="stat ${tot>=0?'green':'red'}">₹${tot}</div>
<div class="stat">Win ${win.length}</div>
<div class="stat">Loss ${loss.length}</div>
<div class="stat">Trades ${T.length}</div>
<div class="stat">WR ${(win.length/T.length*100||0).toFixed(1)}%</div>
`
}

/* ===== TABLE ===== */
function renderAll(){
let f=document.getElementById("filter").value
let arr=T

if(f==="WIN") arr=T.filter(t=>t.pnl>0)
if(f==="LOSS") arr=T.filter(t=>t.pnl<0)

let h="<table><tr><th>Date</th><th>Symbol</th><th>PnL</th><th></th></tr>"

arr.slice().reverse().forEach(t=>{
h+=`
<tr>
<td>${t.date}</td>
<td>${t.symbol}</td>
<td class="${t.pnl>=0?'green':'red'}">₹${t.pnl}</td>
<td><button onclick="del(${t.id})">X</button></td>
</tr>`
})

h+="</table>"

document.getElementById("table").innerHTML=h
}

/* ===== ADD TRADE FIXED ===== */
function addTrade(){
const d=document.getElementById("d").value
const sym=document.getElementById("sym").value
const dir=document.getElementById("dir").value
const qty=parseFloat(document.getElementById("qty").value)||0
const en=parseFloat(document.getElementById("en").value)||0
const ex=parseFloat(document.getElementById("ex").value)||0

if(!d||!sym||qty<=0){
alert("Fill properly")
return
}

const pnl=(ex-en)*qty*(dir==="BUY"?1:-1)

T.push({
id:Date.now(),
date:d,
symbol:sym,
type:dir,
qty,
entry:en,
exit:ex,
pnl
})

save()
init()
}

/* ===== DELETE ===== */
function del(id){
T=T.filter(t=>t.id!==id)
save()
init()
}

/* ===== CHART FIX ===== */
let chart

function renderChart(){

const canvas=document.getElementById("chart")
if(!canvas) return

const ctx=canvas.getContext("2d")
if(!ctx) return

let c=0
const labels=T.map(t=>t.date)
const data=T.map(t=>{c+=t.pnl;return c})

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:'line',
data:{
labels,
datasets:[{
data,
borderColor:"#0fea8e",
tension:.3
}]
},
options:{
plugins:{legend:{display:false}}
}
})
}

/* ===== INIT ===== */
function init(){
stats()
renderAll()
renderChart()

setTimeout(()=>{
window.dispatchEvent(new Event("resize"))
},200)
}

/* ===== START ===== */
document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("d").value=new Date().toISOString().slice(0,10)
init()
})

</script>

</body>
</html>
